name: Validate Skill

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check shell syntax
        run: |
          set -euo pipefail
          for file in install/*.sh scripts/*.sh; do
            bash -n "$file"
          done

      - name: Validate source and regressions
        run: |
          python3 scripts/health_check.py --deep
          PYTHONOPTIMIZE=1 python3 scripts/regression_check.py

      - name: Validate public assets and local README links
        run: bash scripts/verify_assets.sh .
