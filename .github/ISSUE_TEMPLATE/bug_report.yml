name: "🐛 Bug report"
description: "报告多智能体团队初始化、审计、doctor 或回归问题 / Report a bug"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请提供可脱敏的最小复现，不要提交密钥、客户名称或内部绝对路径。
  - type: textarea
    id: expected
    attributes:
      label: 预期与实际行为 / Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 最小复现步骤 / Minimal reproduction
      placeholder: |
        1. 运行 inspect_team.py ...
        2. 运行 ...
        3. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: 脱敏后的 STATE 输出 / Sanitized STATE output
      render: shell
  - type: input
    id: environment
    attributes:
      label: 环境 / Environment
      placeholder: macOS 15, Python 3.11, Bash 5.2
    validations:
      required: true
