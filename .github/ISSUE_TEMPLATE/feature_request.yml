name: "✨ Feature request"
description: "提出新的协作路由、角色模板或验证能力 / Suggest an improvement"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed approach
      description: 请说明对新项目、已有项目或已有团队路由的影响。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响区域 / Area
      options:
        - 路由与安全边界
        - 角色与模型策略
        - 模板与安装器
        - Doctor / 回归验证
        - 文档与视觉资产
        - 其他
    validations:
      required: true
